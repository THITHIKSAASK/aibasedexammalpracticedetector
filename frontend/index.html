<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bannari Amman Institute of Technology - Exam Portal</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="hero-wrapper">
    <!-- Dynamic Background Layers -->
    <div class="hero-bg-layer active" style="background-image: url('css/hero-v4.png');"></div>
    <div class="hero-bg-layer" style="background-image: url('hero-campus.png');"></div>
    <div class="hero-bg-layer" style="background-image: url('hero-v3.png');"></div>
    <div class="hero-overlay"></div>

    <div class="hero-content">
        <!-- HERO PORTAL -->
        <div class="hero-portal animate-in">
            <div class="container" style="padding:0;">
                
                <!-- INITIAL DECISION & LOGIN -->
                <div class="glass-card" id="initial-decision">
                    <div style="display:flex; justify-content:center; margin-bottom:20px;">
                        <img src="hero-campus.png" alt="BIT Campus" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--primary); box-shadow:0 8px 25px rgba(0,0,0,0.3);">
                    </div>
                    <h1 style="color: #fff; margin-bottom: 8px;">Bannari Amman Institute of Technology</h1>
                    <p style="margin-bottom: 30px; font-size: 16px; opacity: 0.8; color: #fff;">Institutional Exam Management System</p>
                    
                    <div id="auth-main-view">
                        <label style="display:block; margin-bottom: 15px; font-size:14px; font-weight:600; color:var(--primary);">Access Gateway</label>
                        <input type="text" id="login-email" placeholder="Institutional Email / Admin ID" autocomplete="off" onkeydown="if(event.key === 'Enter') login()" style="margin-bottom:15px; background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.2); color:#fff;">
                        <button onclick="login()" class="gradient-btn" style="width:100%; margin-bottom: 25px;">Enter Portal &rarr;</button>
                        
                        <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px;">
                            <label style="display:block; margin-bottom: 12px; font-size:13px; opacity:0.7;">New to the platform? Select your role:</label>
                            <div class="role-toggle-container">
                                <button id="role-student" class="role-btn active" onclick="setRegRole('student')">Student</button>
                                <button id="role-teacher" class="role-btn" onclick="setRegRole('teacher')">Faculty</button>
                            </div>
                            <button onclick="goToOnboarding()" class="secondary-btn" style="width:100%;">Create Account</button>
                        </div>
                    </div>

                    <!-- TRUST BADGES -->
                    <div class="trust-badges">
                        <div class="trust-item">
                            Secure Login
                        </div>
                        <div class="trust-item">
                            AI Proctored
                        </div>
                    </div>
                    
                    <p id="error-msg" style="color:var(--danger); margin-top: 20px; font-weight: bold; font-size:14px;"></p>
                </div>

                <!-- TEACHER ONBOARDING (NOW INTEGRATED IN HERO) -->
                <div class="glass-card" id="teacher-onboarding" style="display: none;">
                    <h2 style="color:#fff;">Faculty Registration</h2>
                    <p style="margin-bottom: 20px; font-size: 14px; opacity: 0.8; color:#fff;">Create your institutional faculty profile.</p>
                    <input type="text" id="t-name" placeholder="Full Name (e.g. Dr. John Smith)">
                    <select id="t-gender" style="margin-bottom:15px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2);">
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other / Institutional</option>
                    </select>
                    <input type="email" id="t-email" placeholder="Institutional Email (@bannari.com) *">
                    <select id="t-designation">
                        <option value="">Select Designation</option>
                        <option value="Assistant Professor">Assistant Professor</option>
                        <option value="Associate Professor">Associate Professor</option>
                        <option value="Professor">Professor</option>
                        <option value="Head of Department">Head of Department</option>
                        <option value="Lecturer">Lecturer</option>
                        <option value="Lab Instructor">Lab Instructor</option>
                    </select>
                    <select id="t-subject">
                        <option value="">Select Primary Subject</option>
                        <option value="Science">Science</option>
                        <option value="History">History</option>
                        <option value="English">English</option>
                        <option value="Math">Math</option>
                        <option value="Geography">Geography</option>
                    </select>
                    <input type="text" id="t-class" placeholder="Primary Class (e.g. CSE-A)">
                    
                    <button onclick="registerTeacher()" class="gradient-btn" style="width:100%;">Finalize Faculty Profile</button>
                    <p id="teacher-error" style="color:var(--danger); margin-top: 15px; font-weight: bold;"></p>
                    <p style="margin-top:20px; font-size:14px;"><a href="#" onclick="showDecision()" style="color:var(--primary); text-decoration:none;">&larr; Return to gateway</a></p>
                </div>

                <!-- STUDENT ONBOARDING (NOW INTEGRATED IN HERO) -->
                <div class="glass-card" id="student-onboarding" style="display: none;">
                    <h2 style="color:#fff;">Student Registration</h2>
                    <p style="margin-bottom: 20px; font-size: 14px; opacity: 0.8; color:#fff;">Create your student portal profile.</p>
                    <input type="text" id="s-name" placeholder="Full Name">
                    <select id="s-gender" style="margin-bottom:15px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2);">
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other / Institutional</option>
                    </select>
                    <input type="email" id="s-email" placeholder="Institutional Email (@bannari.com) *">
                    <input type="text" id="s-class" placeholder="Department (e.g. BTech CSE)">
                    <input type="text" id="s-section" placeholder="Section (e.g. S1)">
                    
                    <button onclick="registerStudent()" class="gradient-btn" style="width:100%;">Complete Enrollment</button>
                    <p id="student-error" style="color:var(--danger); margin-top: 15px; font-weight: bold;"></p>
                    <p style="margin-top:20px; font-size:14px;"><a href="#" onclick="showDecision()" style="color:var(--primary); text-decoration:none;">&larr; Return to gateway</a></p>
                </div>

            </div>
        </div>
    </div>

    </div>
    
    <script src="js/theme.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/hero-slider.js"></script>
</body>
</html>
